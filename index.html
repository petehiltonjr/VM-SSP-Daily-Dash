<style>
:root {
  --bg: #0f1117;
  --surface: #181b24;
  --surface2: #1e2130;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8eaf0;
  --text2: #8b90a0;
  --text3: #555b6e;
  --accent: #4f7cff;
  --green: #3ecf8e;
  --amber: #f5a623;
  --red: #f04444;
  --openx: #4f7cff;
  --equativ: #3ecf8e;
  --mag-curate: #f5a623;
  --mag-stream: #c084fc;
  --xandr: #fb923c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; line-height: 1.5; min-height: 100vh; }
.mono { font-family: 'DM Mono', monospace; }

/* Header */
.header { border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 100; }
.header-left { display: flex; align-items: center; gap: 12px; }
.logo { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; color: var(--text); text-transform: uppercase; }
.logo span { color: var(--accent); }
.header-right { font-size: 11px; color: var(--text3); }
.data-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 24px; overflow-x: auto; background: var(--bg); position: sticky; top: 52px; z-index: 99; }
.tab { font-size: 12px; padding: 10px 16px; cursor: pointer; color: var(--text3); border-bottom: 2px solid transparent; white-space: nowrap; transition: color 0.15s; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
.tab:hover { color: var(--text2); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }

/* Layout */
.page { display: none; padding: 20px 24px; }
.page.active { display: block; }
.metrics { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 20px; }
.metrics-3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 20px; }
.mc { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
.mc-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.mc-val { font-size: 24px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; }
.mc-sub { font-size: 10px; color: var(--text3); margin-top: 3px; }
.mc-val.danger { color: var(--red); }
.mc-val.success { color: var(--green); }

/* Chart area */
.chart-grid { display: grid; grid-template-columns: 1fr 200px; gap: 16px; margin-bottom: 20px; }
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.chart-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); margin-bottom: 12px; }
.chart-wrap { position: relative; height: 160px; }
.legend { display: flex; flex-direction: column; gap: 8px; }
.leg { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text2); }
.leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.plat-bars { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
.pb-row { }
.pb-top { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 3px; color: var(--text2); }
.pb-bg { height: 3px; background: var(--surface2); border-radius: 2px; }
.pb-fill { height: 3px; border-radius: 2px; transition: width 0.4s ease; }

/* Flag bar */
.flag-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.fc { flex: 1; min-width: 90px; padding: 10px 14px; border-radius: 8px; border: 1px solid; }
.fc-stopped { background: rgba(240,68,68,0.08); border-color: rgba(240,68,68,0.2); color: #f87171; }
.fc-declining { background: rgba(245,166,35,0.08); border-color: rgba(245,166,35,0.2); color: #fbbf24; }
.fc-growing { background: rgba(62,207,142,0.08); border-color: rgba(62,207,142,0.2); color: var(--green); }
.fc-stable { background: var(--surface); border-color: var(--border); color: var(--text2); }
.fc-num { font-size: 20px; font-weight: 600; font-family: 'DM Mono', monospace; }
.fc-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; opacity: 0.8; }

/* Filters */
.filter-bar { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
.fb { font-size: 11px; padding: 4px 12px; border: 1px solid var(--border2); border-radius: 20px; background: transparent; color: var(--text2); cursor: pointer; font-family: inherit; transition: all 0.15s; }
.fb:hover { border-color: var(--accent); color: var(--text); }
.fb.active { background: rgba(79,124,255,0.15); color: var(--accent); border-color: var(--accent); }
.search-wrap { flex: 1; min-width: 160px; }
.search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); font-family: inherit; font-size: 11px; padding: 5px 10px; height: 28px; outline: none; }
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text3); }

/* Table */
.tbl-wrap { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; max-height: 420px; overflow-y: auto; }
.tbl-wrap::-webkit-scrollbar { width: 4px; }
.tbl-wrap::-webkit-scrollbar-track { background: var(--surface); }
.tbl-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
table { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; }
thead th { font-size: 9px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); background: var(--surface2); position: sticky; top: 0; white-space: nowrap; z-index: 1; }
tbody td { padding: 7px 10px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; background: var(--surface); }
tbody tr:hover td { background: var(--surface2); cursor: pointer; }
tbody tr:last-child td { border-bottom: none; }
.dn { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 0; font-family: 'DM Mono', monospace; font-size: 10px; }
.badge { display: inline-flex; align-items: center; font-size: 9px; padding: 2px 6px; border-radius: 6px; font-weight: 500; white-space: nowrap; font-family: 'DM Sans', sans-serif; }
.b-stopped { background: rgba(240,68,68,0.12); color: #f87171; }
.b-declining { background: rgba(245,166,35,0.12); color: #fbbf24; }
.b-growing { background: rgba(62,207,142,0.12); color: var(--green); }
.b-stable { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
.tu { color: var(--green); font-size: 10px; font-family: 'DM Mono', monospace; }
.td { color: var(--red); font-size: 10px; font-family: 'DM Mono', monospace; }
.tn { color: var(--text3); font-size: 10px; }
.pt { display: inline-block; font-size: 8px; padding: 1px 5px; border-radius: 3px; margin-right: 2px; background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }

/* Detail row */
.dr td { background: var(--surface2) !important; padding: 12px 14px; font-size: 11px; }
.di { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.dl { font-weight: 500; color: var(--text2); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.dv { color: var(--text); line-height: 1.5; }
.dv-empty { color: var(--text3); font-style: italic; }
.dv-week { font-size: 10px; color: var(--text3); margin-top: 4px; }
.dmeta { display: flex; gap: 20px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.dmeta-item .dl { margin-bottom: 2px; }

/* Seller pill */
.seller-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.seller-name { font-size: 18px; font-weight: 600; color: var(--text); }
.seller-meta { font-size: 11px; color: var(--text3); }
.seller-meta span { color: var(--text2); }

/* No results */
.no-r { padding: 32px; text-align: center; color: var(--text3); background: var(--surface); }

/* Section label */
.sec { font-size: 10px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }


.status-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:20px;}
.status-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:10px;}

.status-card.late{border-left:3px solid #f5a623;}
.status-card.missing{border-left:3px solid var(--red);}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.status-dot.ok{background:var(--green);}
.status-dot.late{background:#f5a623;}
.status-dot.missing{background:var(--red);animation:pulse 1.5s infinite;}
.status-name{font-size:12px;font-weight:500;color:var(--text);}
.status-date{font-size:10px;color:var(--text3);margin-top:2px;}
.status-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:500;margin-left:auto;}
.status-badge.ok{background:rgba(62,207,142,0.12);color:var(--green);}
.status-badge.late{background:rgba(245,166,35,0.12);color:#f5a623;}
.status-badge.missing{background:rgba(240,68,68,0.12);color:#f87171;}
/* Responsive */
@media (max-width: 700px) {
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .chart-grid { grid-template-columns: 1fr; }
}
</style>

function trendStr(t) {
  if (t === null || t === undefined) return '<span class="tn">—</span>';
  if (Math.abs(t) > 5000) return '<span class="tu">new</span>';
  const s = t >= 0 ? '+' : '';
  return `<span class="${t > 0 ? 'tu' : 'td'}">${s}${Math.round(t)}%</span>`;
}

function buildTable(deals, id) {
  let fState = 'all', sState = '';
  const wrap = document.createElement('div');
  const fb = document.createElement('div');
  fb.className = 'filter-bar';
  ['all','stopped','declining','growing'].forEach(f => {
    const b = document.createElement('button');
    b.className = 'fb' + (f === 'all' ? ' active' : '');
    b.textContent = f === 'all' ? 'All deals' : f.charAt(0).toUpperCase() + f.slice(1);
    b.addEventListener('click', () => {
      fb.querySelectorAll('.fb').forEach(x => x.classList.remove('active'));
      b.classList.add('active'); fState = f; render();
    });
    fb.appendChild(b);
  });
  const sw = document.createElement('div'); sw.className = 'search-wrap';
  sw.innerHTML = '<input type="text" placeholder="Search deal or platform...">';
  sw.querySelector('input').addEventListener('input', e => { sState = e.target.value; render(); });
  fb.appendChild(sw);
  wrap.appendChild(fb);

  const tw = document.createElement('div'); tw.className = 'tbl-wrap';
  tw.innerHTML = `<table id="${id}"><thead><tr>
    <th style="width:32%">Deal name</th>
    <th style="width:10%">Platform</th>
    <th style="width:10%;text-align:right">Total spend</th>
    <th style="width:9%;text-align:right">Last 7d</th>
    <th style="width:9%;text-align:right">Prior 7d</th>
    <th style="width:7%;text-align:right">Trend</th>
    <th style="width:7%">Status</th>
    <th style="width:16%">Latest note</th>
  </tr></thead><tbody></tbody></table>
  <div class="no-r" style="display:none">No deals match.</div>`;
  wrap.appendChild(tw);
  const tbody = tw.querySelector('tbody');
  const noR = tw.querySelector('.no-r');

  function render() {
    const filtered = deals.filter(d => {
      const fm = fState === 'all' || d.flag === fState;
      const q = sState.toLowerCase();
      const sm = !q || (d.name||'').toLowerCase().includes(q) || (d.platforms||[]).join(' ').toLowerCase().includes(q);
      return fm && sm;
    });
    if (!filtered.length) { tbody.innerHTML = ''; noR.style.display = 'block'; return; }
    noR.style.display = 'none';
    tbody.innerHTML = filtered.map((d,i) => {
      const pts = (d.platforms||[]).map(p => `<span class="pt">${p.replace('Magnite ','Mag.')}</span>`).join('');
      const opt = d.opt || d.notes;
      const optTxt = opt ? opt.substring(0,42) + (opt.length > 42 ? '…' : '') : '<span style="color:var(--text3)">—</span>';
      return `<tr data-i="${i}" style="cursor:pointer">
        <td class="dn" title="${d.name}">${d.name}</td>
        <td>${pts}</td>
        <td style="text-align:right;font-family:'DM Mono',monospace">${fmt(d.total)}</td>
        <td style="text-align:right;font-family:'DM Mono',monospace">${fmt(d.last7)}</td>
        <td style="text-align:right;font-family:'DM Mono',monospace">${fmt(d.prior7)}</td>
        <td style="text-align:right">${trendStr(d.trend)}</td>
        <td><span class="badge b-${d.flag}">${d.flag}</span></td>
        <td style="font-size:10px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:0" title="${opt||''}">${optTxt}</td>
      </tr>`;
    }).join('');
    tbody.querySelectorAll('tr').forEach((row, i) => {
      row.addEventListener('click', () => {
        const next = row.nextSibling;
        if (next && next.classList && next.classList.contains('dr')) { next.remove(); return; }
        const d = filtered[i];
        const tr = document.createElement('tr'); tr.className = 'dr';
        const opt = d.opt || '<span class="dv-empty">None recorded</span>';
        const notes = d.notes || '<span class="dv-empty">None recorded</span>';
        tr.innerHTML = `<td colspan="8"><div class="di">
          <div><div class="dl">Latest optimization</div><div class="dv">${opt}</div>${d.week ? `<div class="dv-week">Week of ${d.week}</div>` : ''}</div>
          <div><div class="dl">Status notes</div><div class="dv">${notes}</div>
            <div class="dmeta">
              <div class="dmeta-item"><div class="dl">Last 7d</div><div class="dv mono">${fmt(d.last7)}</div></div>
              <div class="dmeta-item"><div class="dl">Prior 7d</div><div class="dv mono">${fmt(d.prior7)}</div></div>
              <div class="dmeta-item"><div class="dl">Days since active</div><div class="dv mono">${d.days}</div></div>
            </div>
          </div>
        </div></td>`;
        row.after(tr);
      });
    });
  }
  render();
  return wrap;
}

function buildFlagBar(flags) {
  const bar = document.createElement('div'); bar.className = 'flag-row';
  ['stopped','declining','growing','stable'].forEach(f => {
    const n = flags[f] || 0; if (!n) return;
    bar.innerHTML += `<div class="fc fc-${f}"><div class="fc-num">${n}</div><div class="fc-lbl">${f}</div></div>`;
  });
  return bar;
}

  div.innerHTML = `
    <div class="seller-header">
      <div class="seller-name">${seller}</div>
      <div class="seller-meta"><span>${sd.deals.length} deals</span> · <span class="mono">${fmt(sd.total)}</span> total spend · ${trendHtml}</div>
    </div>
    <div class="metrics-3">
      <div class="mc"><div class="mc-label">Total spend (YTD)</div><div class="mc-val mono">${fmt(sd.total)}</div></div>
      <div class="mc"><div class="mc-label">Last 7 days</div><div class="mc-val mono">${fmt(sd.last7)}</div></div>
      <div class="mc"><div class="mc-label">Prior 7 days</div><div class="mc-val mono">${fmt(sd.prior7)}</div></div>
    </div>`;
  div.appendChild(buildFlagBar(sd.flags));
  const sec = document.createElement('div'); sec.className = 'sec'; sec.style.marginTop = '16px'; sec.textContent = 'Deals';
  div.appendChild(sec);
  div.appendChild(buildTable(sd.deals.sort((a,b)=>b.total-a.total), 'tbl-'+seller));
  tabContents.appendChild(div);
});

// Chart
const labels = DATES.map(shortD);
const datasets = Object.entries(SERIES).map(([name, data]) => ({
  label: name, data, borderColor: PLAT_COLORS[name],
  borderWidth: 1.5, pointRadius: 0, tension: 0.3, fill: false,
  borderDash: name === 'Equativ' ? [4,3] : undefined
}));
new Chart(document.getElementById('trendChart'), {
  type: 'line', data: { labels, datasets },
  options: {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: { legend: { display: false }, tooltip: {
      backgroundColor: '#1e2130', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1,
      titleColor: '#8b90a0', bodyColor: '#e8eaf0', titleFont: { size: 10 },
      callbacks: { label: ctx => ' ' + ctx.dataset.label + ': ' + fmt(ctx.parsed.y) }
    }},
    scales: {
      x: { ticks: { font: { size: 9, family: 'DM Mono' }, color: '#555b6e', maxRotation: 0, autoSkip: true, maxTicksLimit: 8 }, grid: { color: 'rgba(255,255,255,0.03)' } },
      y: { ticks: { font: { size: 9, family: 'DM Mono' }, color: '#555b6e', callback: v => fmtS(v) }, grid: { color: 'rgba(255,255,255,0.05)' } }
    }
  }
});

const leg = document.getElementById('legend');
Object.entries(PLAT_COLORS).forEach(([name, color]) => {
  leg.innerHTML += `<div class="leg"><span class="leg-dot" style="background:${color}"></span>${name}</div>`;
});

const maxT = Math.max(...Object.values(PLAT_TOTALS));
const pb = document.getElementById('platBars');
Object.entries(PLAT_TOTALS).sort((a,b)=>b[1]-a[1]).forEach(([name, val]) => {
  pb.innerHTML += `<div class="pb-row">
    <div class="pb-top"><span>${name}</span><span class="mono">${fmtS(val)}</span></div>
    <div class="pb-bg"><div class="pb-fill" style="width:${Math.round(val/maxT*100)}%;background:${PLAT_COLORS[name]}"></div></div>
  </div>`;
});
</script>
</body>
</html>
